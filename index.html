<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌙</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Optimization -->
    <title>ArabicMuslim | Premium Islamic Portal & Community</title>
    <meta name="description" content="ArabicMuslim is a premium, elegant Islamic platform featuring an interactive Quran reader with audio, real-time prayer calculations, Islamic articles, a live community reflection feed, personal Tasbih counter, and Arabic learning books." />
    <meta name="keywords" content="ArabicMuslim, Islamic website, Learn Arabic, Quran Audio, Prayer Times, Tasbih Counter, Islamic Community, Muslim Articles" />
    <meta name="author" content="ArabicMuslim" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arabicmuslim.com/" />
    <meta property="og:title" content="ArabicMuslim | Premium Islamic Portal & Community" />
    <meta property="og:description" content="Discover Quran with audio recitation, real-time prayer countdowns, community dhikr circles, and handpicked resources." />
    <meta property="og:image" content="https://arabicmuslim.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="ArabicMuslim | Premium Islamic Portal & Community" />
    <meta property="twitter:description" content="Discover Quran with audio recitation, real-time prayer countdowns, community dhikr circles, and handpicked resources." />

    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <style>
      /* Initial Premium Loader */
      body {
        margin: 0;
        background-color: #0b0c10;
        color: #f1f1f1;
        font-family: 'Outfit', sans-serif;
        overflow-x: hidden;
      }
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #08090d;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .loader-crescent {
        font-size: 4rem;
        animation: spin-pulse 2s infinite ease-in-out;
        color: #d4af37;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        margin-bottom: 20px;
      }
      .loader-text {
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem;
        letter-spacing: 2px;
        color: #e5c158;
        background: linear-gradient(135deg, #d4af37 0%, #fff 50%, #c5a059 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: pulse-glow 1.5s infinite alternate;
      }
      @keyframes spin-pulse {
        0% { transform: scale(0.9) rotate(0deg); opacity: 0.7; }
        50% { transform: scale(1.1) rotate(180deg); opacity: 1; }
        100% { transform: scale(0.9) rotate(360deg); opacity: 0.7; }
      }
      @keyframes pulse-glow {
        0% { opacity: 0.5; filter: drop-shadow(0 0 2px rgba(212,175,55,0.2)); }
        100% { opacity: 1; filter: drop-shadow(0 0 8px rgba(212,175,55,0.6)); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-crescent">🌙</div>
      <div class="loader-text">ArabicMuslim</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Hide loader once app is mounted and loaded
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.visibility = 'hidden';
          }, 500);
        }
      });
    </script>
  </body>
</html>
